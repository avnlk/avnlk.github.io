<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokesh Aravapalli (@avnlk)</title>
    <style>
        :root {
            --bg: #0d1117;
            --text: #c9d1d9;
            --accent: #ffb000;       /* Amber */
            --accent-hover: #ff6f00; /* Deep Orange */
            --muted: #8b949e;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 0 20px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            color: var(--accent);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 10px;
        }

        p {
            margin: 6px 0;
            color: var(--muted);
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background: var(--accent);
            animation: blink 1s infinite;
            vertical-align: bottom;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .links {
            margin-top: 20px;
        }

        .links a {
            color: var(--accent);
            text-decoration: none;
            margin: 0 12px;
        }

        .links a:hover {
            color: var(--accent-hover);
        }

        .status {
            margin-top: 15px;
            font-size: 0.95rem;
        }

        .status span {
            color: var(--accent);
            font-weight: bold;
        }

        .footer {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #6e7681;
        }
        
        .projects a {
            color: var(--accent);
            text-decoration: none;
        }
        
        .projects a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Lokesh Aravapalli (@avnlk)<span class="cursor"></span></h1>

    <div class="subtitle">
        IIIT Bangalore • Systems & Hardware
    </div>

    <p>Low-Latency Systems • FPGA • C++</p>

    <p class="status">
        [status] <span>building</span>
    </p>

    <div class="links">
        <a href="https://github.com/avnlk" target="_blank">github</a>
        <a href="https://linkedin.com/in/avnlk" target="_blank">linkedin</a>
        <a href="https://codeforces.com/profile/avnlk" target="_blank">codeforces</a>
    </div>

    <div class="projects">
        <p style="margin-top: 30px; color: var(--muted);">[projects]</p>

        <p>
            <a href="mp2.html">
                triangular interleaver →
            </a><br>
            <span style="font-size: 0.85rem; color: var(--muted);">
                0.41µs latency (~25× faster) using BRAM-based permutation
            </span>
        </p>
    </div>

    <div class="footer">
        last updated: april 2026
    </div>

</div>

</body>
</html>
