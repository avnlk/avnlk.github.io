<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>avnlk</title><style>
    :root {
        --bg: #0d1117;
        --text: #c9d1d9;
        --accent: #58a6ff;
        --green: #3fb950;
    }

    body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        font-family: 'Courier New', monospace;
    }

    .container {
        text-align: center;
        max-width: 600px;
    }

    h1 {
        font-size: 2.2rem;
        margin-bottom: 10px;
        color: var(--accent);
    }

    p {
        margin: 10px 0;
        color: #8b949e;
    }

    .cursor {
        display: inline-block;
        width: 10px;
        height: 1.2em;
        background: var(--green);
        animation: blink 1s infinite;
        vertical-align: bottom;
    }

    @keyframes blink {
        50% { opacity: 0; }
    }

    .links {
        margin-top: 20px;
    }

    a {
        color: var(--accent);
        text-decoration: none;
        margin: 0 10px;
    }

    a:hover {
        color: var(--green);
    }

    .status {
        margin-top: 20px;
        font-size: 0.9rem;
    }

    .status span {
        color: var(--green);
    }
</style>

</head>
<body><div class="container">
    <h1>Lokesh (@avnlk)<span class="cursor"></span></h1>

    <p>Low-Latency Systems • FPGA • C++</p>

    <p class="status">
        [status] building something interesting... <span>coming soon</span>
    </p>

    <div class="links">
        <a href="https://github.com/avnlk" target="_blank">github</a>
        <a href="https://linkedin.com/in/avnlk" target="_blank">linkedin</a>
        <a href="https://codeforces.com/profile/avnlk" target="_blank">codeforces</a>
    </div>
</div>

</body>
</html>
